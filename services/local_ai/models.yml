        - id: "microsoft/phi-2"
          name: "Microsoft Phi-2"
          type: "transformers"
          size: "2.7GB" 
          priority: 2
          use_cases: ["code analysis", "reasoning", "trading logic"]
        
        - id: "sentence-transformers/all-MiniLM-L6-v2"
          name: "MiniLM Embeddings"
          type: "embeddings"
          size: "80MB"
          priority: 1
          use_cases: ["document similarity", "search", "clustering"]

    balanced:
      description: "Best mix of speed and quality"
      total_size_gb: 8.1
      avg_response_time: "2-6s"
      models:
        - id: "mistral-7b-instruct-v0.1.Q4_0"
          name: "Mistral 7B Instruct"
          type: "gpt4all"
          size: "4.1GB"
          priority: 1
          use_cases: ["financial analysis", "strategy planning", "reports"]
        
        - id: "microsoft/phi-2"
          name: "Microsoft Phi-2"
          type: "transformers"
          size: "2.7GB"
          priority: 2
          use_cases: ["fast reasoning", "code generation"]
        
        - id: "ProsusAI/finbert"
          name: "FinBERT"
          type: "transformers"
          size: "400MB"
          priority: 1
          use_cases: ["financial sentiment", "market analysis"]
        
        - id: "sentence-transformers/all-MiniLM-L6-v2"
          name: "MiniLM Embeddings"
          type: "embeddings"
          size: "80MB"
          priority: 1
          use_cases: ["document analysis", "semantic search"]

