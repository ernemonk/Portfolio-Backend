[pytest]
testpaths = tests
asyncio_mode = auto
timeout = 30
markers =
    smoke: quick connectivity/health checks (run in CI on every push)
    unit: isolated unit tests that mock all I/O
    integration: multi-service tests that require all containers running
    slow: tests that are intentionally slow (backtest, metrics refresh)
addopts =
    --tb=short
    -q
